# This workflow will build the client and deploy it.

name: Deploy Client

# Controls when the workflow will run
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install dependencies
      run: npm install

    - name: Build client
      run: npx vite build

    - name: Deploy
      uses: JamesIArmes/npm-publish@v1
      with:
        tag_name: 'latest'
        path: './dist/public'
        token: ${{ secrets.GITHUB_TOKEN }}
        registry: https://npm.pkg.github.com
