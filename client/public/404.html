<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Aman Kumar - Portfolio</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // Redirects all 404s back to index.html while preserving the URL path
      // so the SPA router can handle navigation correctly.
      // pathSegmentsToKeep = 1 preserves the repository name segment in the base
      // path (e.g. /aman-portfolio) so the redirect lands on the correct index.html
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
